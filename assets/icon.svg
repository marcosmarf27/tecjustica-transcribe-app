<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#0a0f18"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eb4ff"/>
      <stop offset="100%" stop-color="#2aa7ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5eb4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5eb4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle glow behind icon -->
  <ellipse cx="256" cy="260" rx="140" ry="140" fill="url(#glow)"/>

  <!-- Scales of Justice (simplified, geometric) -->
  <!-- Center pillar -->
  <rect x="248" y="120" width="16" height="220" rx="8" fill="url(#blue)"/>
  <!-- Base -->
  <rect x="196" y="330" width="120" height="12" rx="6" fill="url(#blue)"/>
  <!-- Top bar -->
  <rect x="148" y="120" width="216" height="10" rx="5" fill="url(#blue)"/>

  <!-- Left pan chain -->
  <line x1="172" y1="130" x2="172" y2="190" stroke="#5eb4ff" stroke-width="4" stroke-linecap="round"/>
  <!-- Right pan chain -->
  <line x1="340" y1="130" x2="340" y2="190" stroke="#5eb4ff" stroke-width="4" stroke-linecap="round"/>

  <!-- Left pan (bowl) -->
  <path d="M132 190 h80 l-10 40 a30 30 0 0 1-60 0 z" fill="#5eb4ff" opacity="0.25"/>
  <path d="M132 190 h80" stroke="#5eb4ff" stroke-width="4" stroke-linecap="round"/>

  <!-- Right pan (bowl) -->
  <path d="M300 190 h80 l-10 40 a30 30 0 0 1-60 0 z" fill="#5eb4ff" opacity="0.25"/>
  <path d="M300 190 h80" stroke="#5eb4ff" stroke-width="4" stroke-linecap="round"/>

  <!-- Soundwave (below scales, represents transcription) -->
  <!-- 7 bars, centered -->
  <rect x="176" y="370" width="6" height="32" rx="3" fill="#5eb4ff" opacity="0.5"/>
  <rect x="196" y="358" width="6" height="56" rx="3" fill="#5eb4ff" opacity="0.6"/>
  <rect x="216" y="348" width="6" height="76" rx="3" fill="#5eb4ff" opacity="0.7"/>
  <rect x="236" y="340" width="6" height="92" rx="3" fill="url(#blue)"/>
  <rect x="256" y="344" width="6" height="84" rx="3" fill="url(#blue)"/>
  <rect x="276" y="352" width="6" height="68" rx="3" fill="#5eb4ff" opacity="0.7"/>
  <rect x="296" y="360" width="6" height="52" rx="3" fill="#5eb4ff" opacity="0.6"/>
  <rect x="316" y="368" width="6" height="36" rx="3" fill="#5eb4ff" opacity="0.5"/>
  <rect x="336" y="374" width="6" height="24" rx="3" fill="#5eb4ff" opacity="0.4"/>
</svg>
